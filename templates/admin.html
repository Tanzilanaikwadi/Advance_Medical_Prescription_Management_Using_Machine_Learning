{% extends "layout.html" %}

{% block title %}Admin Portal - SHREE HEALTHCARE{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card card">
        <div class="text-center">
            <i class="fas fa-user-shield fa-3x" style="color: var(--primary);"></i>
            <h2 class="mt-1">Administrative Login</h2>
            <p style="color: #666; margin-bottom: 2rem;">Authorized access only. Please enter secure credentials.</p>
        </div>

        {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form action="{{ url_for('admin_login') }}" method="POST">
            <div class="form-group">
                <label for="username"><i class="fas fa-id-badge"></i> Username</label>
                <input type="text" id="username" name="username" placeholder="Admin Username" required>
            </div>
            <div class="form-group">
                <label for="password"><i class="fas fa-key"></i> Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">
                <i class="fas fa-sign-in-alt"></i> Authenticate
            </button>
        </form>
    </div>
</div>

<style>
    .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 4rem 1rem;
        background: linear-gradient(rgba(15, 76, 117, 0.9), rgba(15, 76, 117, 0.9)), 
                    url('https://images.unsplash.com/photo-1512758017271-d7b84c2113f1?auto=format&fit=crop&q=80&w=2000');
        background-size: cover;
        background-position: center;
        min-height: calc(100vh - 70px);
        overflow-y: auto;
    }
    .auth-card {
        width: 100%;
        max-width: 400px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
    }
</style>
{% endblock %}
