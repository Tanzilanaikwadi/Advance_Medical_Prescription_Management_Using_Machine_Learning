{% extends "layout.html" %}

{% block title %}Booking Failed - SHREE HEALTHCARE{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card card text-center" style="max-width: 500px; border-top: 5px solid #d63031;">
        <div class="mb-2">
            <i class="fas fa-times-circle fa-5x" style="color: #d63031;"></i>
        </div>
        
        <h2>Booking Failed!</h2>
        <p class="mt-1" style="color: #666; font-size: 1.1rem; line-height: 1.6;">
            We encountered an error while processing your appointment request. This could be due to a technical issue or conflicting schedule.
        </p>
        
        <div class="mt-2" style="display: flex; gap: 10px;">
            <a href="{{ url_for('appointment') }}" class="btn btn-primary" style="flex: 2;">
                <i class="fas fa-redo"></i> Try Again
            </a>
            <a href="{{ url_for('patient_dashboard') }}" class="btn btn-outline" style="flex: 1;">
                Go Back
            </a>
        </div>
    </div>
</div>

<style>
    .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 4rem 1rem;
        background: #fff5f5;
        min-height: calc(100vh - 70px);
        overflow-y: auto;
    }
</style>
{% endblock %}
