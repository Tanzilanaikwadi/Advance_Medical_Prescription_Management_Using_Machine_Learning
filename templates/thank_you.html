{% extends "layout.html" %}

{% block title %}Submission Successful - SHREE HEALTHCARE{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card card text-center" style="max-width: 500px;">
        <div class="success-animation mb-2">
            <svg class="checkmark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
                <circle class="checkmark__circle" cx="26" cy="26" r="25" fill="none"/>
                <path class="checkmark__check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
            </svg>
        </div>
        
        <h2>Submission Successful!</h2>
        <p class="mt-1" style="color: #666; font-size: 1.1rem; line-height: 1.6;">
            Thank you for sharing your thoughts with us. Your input helps us improve SHREE HEALTHCARE for everyone.
        </p>
        
        <div class="mt-2">
            <a href="{{ url_for('home') }}" class="btn btn-primary" style="width: 100%;">
                <i class="fas fa-home"></i> Return to Homepage
            </a>
        </div>
    </div>
</div>

<style>
    .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 4rem 1rem;
        background: #f0f2f5;
        min-height: calc(100vh - 70px);
        overflow-y: auto;
    }
    
    .checkmark__circle {
        stroke-dasharray: 166;
        stroke-dashoffset: 166;
        stroke-width: 2;
        stroke-miterlimit: 10;
        stroke: #7ac142;
        fill: none;
        animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
    }
    
    .checkmark {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        display: block;
        stroke-width: 2;
        stroke: #fff;
        stroke-miterlimit: 10;
        margin: 10% auto;
        box-shadow: inset 0px 0px 0px #7ac142;
        animation: fill .4s ease-in-out .4s forwards, scale .3s ease-in-out .9s both;
    }
    
    .checkmark__check {
        transform-origin: 50% 50%;
        stroke-dasharray: 48;
        stroke-dashoffset: 48;
        animation: stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.8s forwards;
    }
    
    @keyframes stroke { 100% { stroke-dashoffset: 0; } }
    @keyframes scale { 0%, 100% { transform: none; } 50% { transform: scale3d(1.1, 1.1, 1); } }
    @keyframes fill { 100% { box-shadow: inset 0px 0px 0px 40px #7ac142; } }
</style>
{% endblock %}
