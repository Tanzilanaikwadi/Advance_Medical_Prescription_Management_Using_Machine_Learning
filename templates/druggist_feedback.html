{% extends "layout.html" %}

{% block title %}Pharmacist Feedback - SHREE HEALTHCARE{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card card" style="max-width: 600px;">
        <div class="text-center mb-2">
            <i class="fas fa-prescription-bottle-alt fa-3x" style="color: var(--primary);"></i>
            <h2 class="mt-1">Druggist's Feedback</h2>
            <p style="color: #666;">Provide insights on pharmacy operations, inventory management, or system usability.</p>
        </div>

        <form method="post">
            <div class="form-group">
                <label>Operational Feedback</label>
                <textarea name="feedback" placeholder="Share your suggestions for the pharmacy system..." required style="min-height: 150px; padding: 1rem; border-radius: 12px; border: 2px solid #eee; width: 100%; font-family: inherit; font-size: 1rem; transition: border-color 0.3s;"></textarea>
            </div>
            
            <div style="display: flex; gap: 10px; margin-top: 1.5rem;">
                <button type="submit" class="btn btn-primary" style="flex: 2;">Submit Feedback</button>
                <a href="{{ url_for('druggist_dashboard') }}" class="btn btn-outline" style="flex: 1; text-align: center;">Cancel</a>
            </div>
        </form>
    </div>
</div>

<style>
    .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 4rem 1rem;
        background: #f0f7f4;
        min-height: calc(100vh - 70px);
        overflow-y: auto;
    }
    textarea:focus {
        border-color: var(--primary) !important;
        outline: none;
    }
</style>
{% endblock %}
