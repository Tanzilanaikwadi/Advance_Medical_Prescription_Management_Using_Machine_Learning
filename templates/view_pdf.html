{% extends "layout.html" %}

{% block title %}View Prescription - Pharmacy{% endblock %}

{% block content %}
<div class="pdf-viewer-container" style="padding: 2rem; background: #f0f2f5; min-height: calc(100vh - 70px);
        overflow-y: auto; display: flex; flex-direction: column; align-items: center;">
    <div class="card" style="width: 100%; max-width: 1000px; padding: 0; overflow: hidden; border: none; box-shadow: var(--shadow);">
        <div class="p-1" style="background: var(--primary); color: white; display: flex; justify-content: space-between; align-items: center;">
            <h3 style="margin: 0;"><i class="fas fa-file-pdf"></i> Prescription: {{ filename }}</h3>
            <a href="{{ url_for('druggist_dashboard') }}" class="btn btn-sm btn-outline" style="border-color: white; color: white;">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </a>
        </div>
        
        <div style="height: 80vh;">
            <iframe src="{{ url_for('static', filename='prescriptions/' + filename) }}" style="width: 100%; height: 100%; border: none;"></iframe>
        </div>
    </div>
    
    <div class="mt-2 text-center">
        <p style="color: #666; font-size: 0.9rem;">
            <i class="fas fa-info-circle"></i> If the PDF does not display, 
            <a href="{{ url_for('static', filename='prescriptions/' + filename) }}" target="_blank" style="color: var(--primary); font-weight: 600;">click here to download</a>.
        </p>
    </div>
</div>
{% endblock %}
