{% extends "layout.html" %}

{% block title %}Druggist Login - SHREE HEALTHCARE{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card card">
        <div class="text-center">
            <i class="fas fa-pills fa-3x" style="color: var(--primary);"></i>
            <h2 class="mt-1">Pharmacy Portal</h2>
            <p style="color: #666; margin-bottom: 2rem;">Manage medicine inventory and process prescriptions.</p>
        </div>

        <form method="POST">
            <div class="form-group">
                <label for="username"><i class="fas fa-user"></i> Username</label>
                <input type="text" name="username" placeholder="Pharmacy Username" required>
            </div>
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">
                <i class="fas fa-sign-in-alt"></i> Login to Pharmacy
            </button>
        </form>
    </div>
</div>

<style>
    .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 4rem 1rem;
        background: linear-gradient(rgba(15, 76, 117, 0.8), rgba(15, 76, 117, 0.8)), 
                    url('https://images.unsplash.com/photo-1586015555751-63bb77f4322a?auto=format&fit=crop&q=80&w=2000');
        background-size: cover;
        background-position: center;
        min-height: calc(100vh - 70px);
        overflow-y: auto;
    }
    .auth-card {
        width: 100%;
        max-width: 400px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
    }
</style>
{% endblock %}
